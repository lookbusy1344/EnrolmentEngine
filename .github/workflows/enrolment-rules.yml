name: EnrolmentRules CI

# Build, verify formatting and run tests whenever the EnrolmentRules .NET
# solution changes. Mirrors scripts/pre-commit.sh.
on:
  push:
    paths:
      - 'EnrolmentRules/**'
      - '.github/workflows/enrolment-rules.yml'
  pull_request:
    paths:
      - 'EnrolmentRules/**'
      - '.github/workflows/enrolment-rules.yml'

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SOLUTION: EnrolmentRules/EnrolmentRules.slnx
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

jobs:
  build-test:
    name: Build, format & test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: 'EnrolmentRules/src/EnrolmentRules.Web/ClientApp/package.json'

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'EnrolmentRules/src/EnrolmentRules.Web/ClientApp/pnpm-lock.yaml'

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore "$SOLUTION"

      - name: Build
        run: dotnet build "$SOLUTION" --no-restore

      - name: Verify formatting
        run: dotnet format "$SOLUTION" --verify-no-changes

      - name: Test
        run: dotnet test "$SOLUTION" --no-build
