# Qualification scale — the single source of truth for comparing typed prior qualifications.
# Each entry carries a type, a grade token, an ordinal within that type, and an A-level-points
# equivalence used for prediction raises and policy thresholds.
qualifications:
  - type: a_level
    grades:
      - { grade: u, ordinal: 0, equivalence: 0.0 }
      - { grade: e, ordinal: 1, equivalence: 1.0 }
      - { grade: d, ordinal: 2, equivalence: 2.0 }
      - { grade: c, ordinal: 3, equivalence: 3.0 }
      - { grade: b, ordinal: 4, equivalence: 4.0 }
      - { grade: a, ordinal: 5, equivalence: 5.0 }
      - { grade: a_star, ordinal: 6, equivalence: 6.0 }
  - type: btec_extended_certificate
    grades:
      - { grade: pass, ordinal: 0, equivalence: 2.0 }
      - { grade: merit, ordinal: 1, equivalence: 3.0 }
      - { grade: distinction, ordinal: 2, equivalence: 5.0 }
      - { grade: distinction_star, ordinal: 3, equivalence: 6.0 }
  - type: btec_diploma
    grades:
      - { grade: pass, ordinal: 0, equivalence: 3.0 }
      - { grade: merit, ordinal: 1, equivalence: 4.0 }
      - { grade: distinction, ordinal: 2, equivalence: 5.0 }
      - { grade: distinction_star, ordinal: 3, equivalence: 6.0 }
  - type: nvq
    grades:
      - { grade: level_1, ordinal: 1, equivalence: 1.0 }
      - { grade: level_2, ordinal: 2, equivalence: 2.0 }
      - { grade: level_3, ordinal: 3, equivalence: 3.0 }
