# Runtime policy thresholds for eligibility and subject rating. The shipped values mirror the
# historical constants so first release behavior is unchanged; admins may retune this file at startup.
pass_grade: 4
min_passes: 5
top_entry: 7
strong_entry: 6
standard_entry: 5
further_maths_average_entry: 7.0
humanities_average_entry: 5.0
min_dfe_green_probability_at_or_above: 0.60
min_dfe_amber_probability_at_or_above: 0.50
adult_age: 19
# max_green_choices is an optional, normally-unused feature: when omitted (as here) the green cap is
# disabled and every subject rated green stays green — the engine reports what a student is allowed to
# study, it does not force an "optimal" shortlist. Set it to a positive integer only if policy demands
# an auto-enrol ceiling, in which case the lowest-priority-weight surplus greens are demoted to amber.
# max_green_choices: 4
amber_score_factor: 0.5
# advice_considers_unsat_gcses is a diagnostic knob, off by default. When false the counterfactual
# advisor (--advise) only proposes raising GCSEs the student already sat — actionable advice, and a far
# cheaper search. Set it to true to revert to the old behaviour, which may also propose sitting a brand
# new GCSE; useful for diagnosing why a subject is reachable or unreachable, not for normal operation.
advice_considers_unsat_gcses: false
advice_max_grade_cost: 12
advice_max_subjects_changed: 3
# advice_max_pipeline_evaluations:  # optional hard cap on full pipeline runs per advise call; omit for unlimited
