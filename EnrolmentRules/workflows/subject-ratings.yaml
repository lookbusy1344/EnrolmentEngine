WorkflowName: 'subject-ratings'
Rules:
  - RuleName: 'maths:green'
    SuccessEvent: 'Entry met; predicted A-level grade at or above the green threshold'
    Expression: >-
      facts.Gcse("maths") >= facts.TopEntry && facts.Predicted("maths") >= ALevelGrade.A && facts.DfeProbabilityAtOrAbove("maths", ALevelGrade.A) >= facts.MinDfeGreenProbabilityAtOrAbove
  - RuleName: 'maths:amber'
    SuccessEvent: 'Entry met; predicted A-level grade at or above the amber threshold'
    Expression: >-
      facts.Gcse("maths") >= facts.TopEntry && facts.Predicted("maths") >= ALevelGrade.B && facts.DfeProbabilityAtOrAbove("maths", ALevelGrade.B) >= facts.MinDfeAmberProbabilityAtOrAbove
  - RuleName: 'maths:red'
    SuccessEvent: 'Entry requirement unmet or predicted grade below the amber threshold'
    Expression: >-
      true
  - RuleName: 'further_maths:green'
    SuccessEvent: 'Entry met; predicted A-level grade at or above the green threshold'
    Expression: >-
      facts.Gcse("maths") >= facts.TopEntry && facts.Average >= facts.FurtherMathsAverageEntry && facts.Predicted("further_maths") >= ALevelGrade.A && facts.DfeProbabilityAtOrAbove("further_maths", ALevelGrade.A) >= facts.MinDfeGreenProbabilityAtOrAbove
  - RuleName: 'further_maths:amber'
    SuccessEvent: 'Entry met; predicted A-level grade at or above the amber threshold'
    Expression: >-
      facts.Gcse("maths") >= facts.TopEntry && facts.Average >= facts.FurtherMathsAverageEntry && facts.Predicted("further_maths") >= ALevelGrade.B && facts.DfeProbabilityAtOrAbove("further_maths", ALevelGrade.B) >= facts.MinDfeAmberProbabilityAtOrAbove
  - RuleName: 'further_maths:red'
    SuccessEvent: 'Entry requirement unmet or predicted grade below the amber threshold'
    Expression: >-
      true
  - RuleName: 'physics:green'
    SuccessEvent: 'Entry met; predicted A-level grade at or above the green threshold'
