WorkflowName: 'subject-ratings'
Rules:
  - RuleName: 'maths:green'
    SuccessEvent: 'Entry met (Maths GCSE at the exceptional grade); predicted A-level grade at or above the green threshold'
    Expression: >-
      facts.Gcse("maths") >= facts.ExceptionalEntry && facts.Predicted("maths") >= ALevelGrade.D && facts.DfeProbabilityAtOrAbove("maths", ALevelGrade.D) >= facts.MinDfeGreenProbabilityAtOrAbove
  - RuleName: 'maths:amber'
    SuccessEvent: 'Entry met (Maths GCSE at the exceptional grade); predicted A-level grade at or above the amber threshold'
    Expression: >-
      facts.Gcse("maths") >= facts.ExceptionalEntry && facts.Predicted("maths") >= ALevelGrade.E && facts.DfeProbabilityAtOrAbove("maths", ALevelGrade.E) >= facts.MinDfeAmberProbabilityAtOrAbove
  - RuleName: 'maths:red'
    SuccessEvent: 'Entry requirement unmet or predicted grade below the amber threshold'
    Expression: >-
      true
  - RuleName: 'further_maths:green'
    SuccessEvent: 'Entry met (GCSE Maths at the top grade, or a matching prior qualification); predicted A-level grade at or above the green threshold'
    Expression: >-
      (facts.HasEntryEquivalent("further_maths") || (facts.Gcse("maths") >= facts.TopEntry && facts.Average >= facts.FurtherMathsAverageEntry)) && facts.Predicted("further_maths") >= ALevelGrade.D && facts.DfeProbabilityAtOrAbove("further_maths", ALevelGrade.D) >= facts.MinDfeGreenProbabilityAtOrAbove
  - RuleName: 'further_maths:amber'
