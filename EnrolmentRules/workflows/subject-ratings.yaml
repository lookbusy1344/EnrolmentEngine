  - RuleName: 'physics:red'
    SuccessEvent: 'Entry requirement unmet or predicted grade below the amber threshold'
    Expression: >-
      true
  - RuleName: 'chemistry:green'
    SuccessEvent: 'Entry met; predicted A-level grade at or above the green threshold'
    Expression: >-
      facts.Gcse("chemistry") >= facts.StrongEntry && facts.Gcse("maths") >= facts.StandardEntry && facts.Predicted("chemistry") >= ALevelGrade.B && facts.DfeProbabilityAtOrAbove("chemistry", ALevelGrade.B) >= facts.MinDfeGreenProbabilityAtOrAbove
  - RuleName: 'chemistry:amber'
